# ~/.config/hypr/hyprlock.conf

# --- General Settings ---
general {
    disable_loading_bar = true
    hide_cursor = true
    no_fade_in = false
    ignore_empty_input = true
    immediately_render = true
    fractional_scaling = 1 # Important for high-DPI screens
}

# --- Background: Blurred Wallpaper ---
background {
    monitor = 
    path = screenshot # Takes a screenshot of current desktop and blurs it
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.8
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# --- Input Field (Password Box) ---
input-field {
    monitor = 
    size = 300, 50
    outline_thickness = 4
    dots_size = 0.2 # Scale of the password dots
    dots_spacing = 0.3 # Spacing between dots
    dots_center = true
    outer_color = rgb(180, 190, 254) # Catppuccin Blue (Lavender-ish)
    inner_color = rgb(36, 39, 58)   # Catppuccin Macchiato Base
    font_color = rgb(205, 214, 244) # Catppuccin Text
    fade_on_empty = true
    fade_timeout = 500
    placeholder_text = <i>Password...</i>
    hide_input_on_roundtrip = true
    halign = center
    valign = center
    position = 0, -20 # Slightly above center
    rounding = 10
    check_color = rgb(166, 227, 161) # Green for success
    fail_color = rgb(239, 111, 116)  # Red for fail
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(250, 179, 135) # Orange for capslock
    numeric_color = rgb(180, 190, 254)
    last_password_color = rgb(245, 194, 231) # Pink for last attempt
}

# --- Clock Label ---
label {
    monitor = 
    text = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color = rgb(205, 214, 244)
    font_size = 60
    font_family = JetBrainsMono Nerd Font
    rotate = 0
    halign = center
    valign = center
    position = 0, -100
}

# --- Date Label (Optional) ---
label {
    monitor = 
    text = cmd[update:43200000] echo "<b>$(date +'%A, %d %B %Y')</b>"
    color = rgb(166, 227, 161) # Green
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    rotate = 0
    halign = center
    valign = center
    position = 0, -40
}

# --- User Label (Optional) ---
label {
    monitor = 
    text = $USER
    color = rgb(180, 190, 254)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    halign = center
    valign = center
    position = 0, 100
}
