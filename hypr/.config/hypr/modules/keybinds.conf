##############################
##### KEYBINDS MODULE ########
##############################

# Keybinds (except main hyprland keys (terminal, basic navigation ect) will go here.

# ------------------------------------------------------------------------------
# 1. WORKSPACE: Navigation
# ------------------------------------------------------------------------------

# --- CENTER MONITOR (1-5) -> SUPER + 1-5 ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# --- LEFT MONITOR (11-13) -> SUPER + CTRL + 1-3 ---
bind = SUPER CTRL, 1, workspace, 11
bind = SUPER CTRL, 2, workspace, 12
bind = SUPER CTRL, 3, workspace, 13

# --- RIGHT MONITOR (21-23) -> SUPER + ALT + 1-3 ---
bind = SUPER ALT, 1, workspace, 21
bind = SUPER ALT, 2, workspace, 22
bind = SUPER ALT, 3, workspace, 23

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move focus with mainMod + arrow ke<D-d>ys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ------------------------------------------------------------------------------
# 2. WORKSPACE: Moving Windows
# ------------------------------------------------------------------------------

# --- CENTER (SUPER + SHIFT + 1-5) ---
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# --- LEFT (SUPER + CTRL + SHIFT + 1-3) ---
bind = SUPER CTRL SHIFT, 1, movetoworkspace, 11
bind = SUPER CTRL SHIFT, 2, movetoworkspace, 12
bind = SUPER CTRL SHIFT, 3, movetoworkspace, 13

# --- RIGHT (SUPER + ALT + SHIFT + 1-3) ---
bind = SUPER ALT SHIFT, 1, movetoworkspace, 21
bind = SUPER ALT SHIFT, 2, movetoworkspace, 22
bind = SUPER ALT SHIFT, 3, movetoworkspace, 23

# ------------------------------------------------------------------------------
# 3. WORKSPACE: Special Workspaces (Scratchpads)
# ------------------------------------------------------------------------------

# SUPER + S: Toggle visibility of the scratchpad specific to the monitor under your mouse
bind = $mainMod, S, exec, ~/.config/hypr/scripts/dynamic-scratchpad.sh toggle

# SUPER + SHIFT + S: Toggle the focused window INTO/OUT OF the scratchpad specific to the monitor under your mouse
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/dynamic-scratchpad.sh move

# ------------------------------------------------------------------------------
# 4. Tools: Hyprshot
# ------------------------------------------------------------------------------

# Screenshot a window
bind = $mainMod, PRINT, exec, hyprshot -m window
# Screenshot a region
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m region

# ------------------------------------------------------------------------------
# 4. Tools: Media Keys
# ------------------------------------------------------------------------------

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindl = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bindl = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%

# ------------------------------------------------------------------------------
# 5. Apps: Zen Browser
# ------------------------------------------------------------------------------

bind = $mainMod, Z, exec, zen-browser
