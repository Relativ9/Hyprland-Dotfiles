# ==============================================================================
# MODULE: Workspaces & Monitor Assignment
# Path: ~/.config/hypr/modules/workspaces.conf
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. WORKSPACE RULES (Assigning Workspaces to Monitors)
# ------------------------------------------------------------------------------

# --- LEFT MONITOR (DP-2 - Vertical) ---
# Using 11-13 to keep them distinct from main
workspace = 11, monitor:HDMI-A-2, default:true
workspace = 12, monitor:HDMI-A-2, default:true
workspace = 13, monitor:HDMI-A-2, default:true

# --- CENTER MONITOR (HDMI-A-1 - Main Horizontal) ---
# Using 1-5 for primary workflow
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3, default:true
workspace = 3, monitor:DP-3, default:true
workspace = 4, monitor:DP-3, default:true
workspace = 5, monitor:DP-3, default:true

# --- RIGHT MONITOR (DP-1 - Vertical) ---
# Using 21-23 to keep them distinct
workspace = 21, monitor:DP-2, default:true
workspace = 22, monitor:DP-2, default:true
workspace = 23, monitor:DP-2, default:true

# --- SPECIAL WORKSPACES (Scratchpads) ---
# These float above all monitors and toggle on demand
workspace = special:scratchpad, on-created-empty:exec kitty --class floatterm
workspace = special:media, on-created-empty:exec spotify
workspace = special:reference, on-created-empty:exec firefox --new-window about:blank

